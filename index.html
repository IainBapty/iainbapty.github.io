<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <title>Hangman</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --line: #e2e8f0;
      --accent: #38bdf8;
      --hit: #22c55e;
      --miss: #475569;
      --danger: #ef4444;
      --key: #334155;
      --text: #f1f5f9;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      padding: env(safe-area-inset-top) 12px calc(12px + env(safe-area-inset-bottom));
    }
    h1 {
      font-size: 1.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 14px 0 10px;
      color: var(--accent);
    }
    .screen { width: 100%; max-width: 520px; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* Setup screen */
    #setup { gap: 16px; margin-top: 8vh; text-align: center; }
    #setup p { color: #94a3b8; line-height: 1.4; margin: 0 8px; }
    #wordInput {
      width: 100%;
      font-size: 1.5rem;
      padding: 14px 16px;
      text-align: center;
      border-radius: 12px;
      border: 2px solid var(--key);
      background: var(--panel);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    #wordInput:focus { outline: none; border-color: var(--accent); }
    .btn {
      font-size: 1.15rem;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #08131f;
      cursor: pointer;
      width: 100%;
    }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: var(--key); color: var(--text); }
    #setupError { color: var(--danger); min-height: 1.2em; font-size: 0.95rem; }

    /* Play screen */
    svg { width: 100%; max-width: 260px; height: auto; display: block; }
    .piece { stroke: var(--line); stroke-width: 6; stroke-linecap: round; fill: none; visibility: hidden; }
    #head { fill: none; }

    #status { min-height: 1.6em; font-size: 1.05rem; font-weight: 600; margin: 6px 0; }
    #status.win { color: var(--hit); }
    #status.lose { color: var(--danger); }

    #wordRow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 10px;
      margin: 4px 0 12px;
      min-height: 44px;
    }
    .slot {
      width: 26px;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      border-bottom: 3px solid var(--line);
      line-height: 1.3;
    }
    .slot.space { border-bottom: none; width: 14px; }
    .slot.revealed.missed { color: var(--danger); }

    #keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .krow { display: flex; justify-content: center; gap: 5px; }
    .key {
      flex: 1 1 0;
      max-width: 44px;
      height: 48px;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--key);
      color: var(--text);
      cursor: pointer;
    }
    .key:active { transform: translateY(1px); }
    .key.hit { background: var(--hit); color: #08210f; }
    .key.miss { background: var(--miss); color: #94a3b8; }
    .key:disabled { cursor: default; }

    #playControls { margin-top: 14px; width: 100%; }
  </style>
</head>
<body>
  <h1>Hangman</h1>

  <!-- SETUP -->
  <section id="setup" class="screen active">
    <p>Player 1: type a word or short phrase, then pass the phone to the others.</p>
    <input id="wordInput" type="text" autocomplete="off" autocapitalize="characters"
           spellcheck="false" placeholder="Type a word…" aria-label="Secret word">
    <div id="setupError"></div>
    <button id="startBtn" class="btn">Start game</button>
  </section>

  <!-- PLAY -->
  <section id="play" class="screen">
    <svg viewBox="0 0 200 220" aria-label="Hangman drawing" role="img">
      <!-- gallows -->
      <line class="piece" data-i="0" x1="20"  y1="210" x2="120" y2="210"/> <!-- base -->
      <line class="piece" data-i="1" x1="50"  y1="210" x2="50"  y2="20"/>  <!-- pole -->
      <line class="piece" data-i="2" x1="47"  y1="20"  x2="130" y2="20"/>  <!-- beam -->
      <line class="piece" data-i="3" x1="130" y1="20"  x2="130" y2="45"/>  <!-- noose -->
      <!-- body -->
      <circle class="piece" id="head" data-i="4" cx="130" cy="63" r="18"/>
      <line class="piece" data-i="5" x1="130" y1="81"  x2="130" y2="140"/> <!-- body -->
      <line class="piece" data-i="6" x1="130" y1="95"  x2="105" y2="120"/> <!-- left arm -->
      <line class="piece" data-i="7" x1="130" y1="95"  x2="155" y2="120"/> <!-- right arm -->
      <line class="piece" data-i="8" x1="130" y1="140" x2="110" y2="175"/> <!-- left leg -->
      <line class="piece" data-i="9" x1="130" y1="140" x2="150" y2="175"/> <!-- right leg -->
    </svg>

    <div id="status">&nbsp;</div>
    <div id="wordRow"></div>
    <div id="keyboard"></div>

    <div id="playControls">
      <button id="againBtn" class="btn secondary">New word</button>
    </div>
  </section>

  <script>
    (function () {
      var MAX_MISSES = 10; // 10 pieces including the noose
      var pieces = Array.prototype.slice.call(document.querySelectorAll('.piece'));

      var setup = document.getElementById('setup');
      var play = document.getElementById('play');
      var wordInput = document.getElementById('wordInput');
      var startBtn = document.getElementById('startBtn');
      var setupError = document.getElementById('setupError');
      var statusEl = document.getElementById('status');
      var wordRow = document.getElementById('wordRow');
      var keyboard = document.getElementById('keyboard');
      var againBtn = document.getElementById('againBtn');

      var word = '';        // uppercase target
      var guessed = null;   // Set of guessed letters
      var misses = 0;
      var over = false;
      var keyEls = {};

      var ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];

      function buildKeyboard() {
        keyboard.innerHTML = '';
        keyEls = {};
        ROWS.forEach(function (row) {
          var rowEl = document.createElement('div');
          rowEl.className = 'krow';
          row.split('').forEach(function (ch) {
            var b = document.createElement('button');
            b.className = 'key';
            b.textContent = ch;
            b.setAttribute('aria-label', 'Guess letter ' + ch);
            b.addEventListener('click', function () { guess(ch); });
            rowEl.appendChild(b);
            keyEls[ch] = b;
          });
          keyboard.appendChild(rowEl);
        });
      }

      function showScreen(el) {
        setup.classList.remove('active');
        play.classList.remove('active');
        el.classList.add('active');
      }

      function startGame() {
        var raw = wordInput.value.toUpperCase().replace(/[^A-Z ]/g, ' ').replace(/\s+/g, ' ').trim();
        if (!/[A-Z]/.test(raw)) {
          setupError.textContent = 'Please enter at least one letter.';
          return;
        }
        setupError.textContent = '';
        word = raw;
        guessed = {};
        misses = 0;
        over = false;

        buildKeyboard();
        pieces.forEach(function (p) { p.style.visibility = 'hidden'; });
        statusEl.textContent = ' ';
        statusEl.className = '';
        renderWord();
        showScreen(play);
      }

      function renderWord() {
        wordRow.innerHTML = '';
        word.split('').forEach(function (ch) {
          var slot = document.createElement('div');
          slot.className = 'slot';
          if (ch === ' ') {
            slot.classList.add('space');
          } else if (guessed[ch]) {
            slot.textContent = ch;
            slot.classList.add('revealed');
          } else if (over) {
            // reveal on loss
            slot.textContent = ch;
            slot.classList.add('revealed', 'missed');
          }
          wordRow.appendChild(slot);
        });
      }

      function drawMisses() {
        pieces.forEach(function (p) {
          var i = parseInt(p.getAttribute('data-i'), 10);
          p.style.visibility = (i < misses) ? 'visible' : 'hidden';
        });
      }

      function isWon() {
        for (var i = 0; i < word.length; i++) {
          var ch = word[i];
          if (ch !== ' ' && !guessed[ch]) return false;
        }
        return true;
      }

      function updateStatus() {
        if (isWon()) {
          over = true;
          statusEl.textContent = 'You won! 🎉';
          statusEl.className = 'win';
        } else if (misses >= MAX_MISSES) {
          over = true;
          statusEl.textContent = 'Game over — the word was ' + word;
          statusEl.className = 'lose';
        } else {
          var left = MAX_MISSES - misses;
          statusEl.textContent = left + (left === 1 ? ' guess left' : ' guesses left');
          statusEl.className = '';
        }
        if (over) disableAllKeys();
      }

      function disableAllKeys() {
        for (var k in keyEls) { keyEls[k].disabled = true; }
      }

      function guess(letter) {
        if (over || guessed[letter]) return;
        guessed[letter] = true;
        var key = keyEls[letter];
        key.disabled = true;

        if (word.indexOf(letter) !== -1) {
          key.classList.add('hit');
        } else {
          key.classList.add('miss');
          misses++;
          drawMisses();
        }
        renderWord();
        updateStatus();
        if (over) renderWord(); // re-render to reveal word on loss
      }

      startBtn.addEventListener('click', startGame);
      wordInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') startGame();
      });
      againBtn.addEventListener('click', function () {
        wordInput.value = '';
        setupError.textContent = '';
        showScreen(setup);
        wordInput.focus();
      });

      // Allow a physical keyboard too (handy on desktop / while testing)
      document.addEventListener('keydown', function (e) {
        if (!play.classList.contains('active') || over) return;
        var ch = e.key.toUpperCase();
        if (ch.length === 1 && ch >= 'A' && ch <= 'Z') guess(ch);
      });
    })();
  </script>
</body>
</html>
